<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --border2: #383838;
    --text: #e8e4dc;
    --text2: #888;
    --text3: #555;
    --accent: #c8b97a;
    --accent2: #8fb3a0;
    --node-bg: #1e1e1e;
    --node-border: #333;
    --node-selected: #c8b97a;
    --connector: #3a3a3a;
    --danger: #c87a7a;
    --radius: 8px;
    --grid: 28px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 100;
  }
  #toolbar .brand {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--accent);
    margin-right: 12px;
  }
  .sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
  .btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: var(--accent); color: var(--bg); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn svg { width: 13px; height: 13px; }
  #toolbar .spacer { flex: 1; }

  .layout-btns { display: flex; gap: 4px; }
  .layout-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .layout-btn.active, .layout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  #main { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #node-tree { flex: 1; overflow-y: auto; padding: 8px 0; }
  #node-tree::-webkit-scrollbar { width: 4px; }
  #node-tree::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .tree-item {
    display: flex; align-items: center;
    padding: 5px 10px; cursor: pointer;
    font-size: 12px; color: var(--text2);
    transition: all 0.1s; gap: 6px;
    border-left: 2px solid transparent;
  }
  .tree-item:hover { background: var(--surface2); color: var(--text); }
  .tree-item.selected { color: var(--accent); border-left-color: var(--accent); background: rgba(200,185,122,0.05); }
  .tree-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .tree-item.selected .dot { background: var(--accent); }

  #props { border-top: 1px solid var(--border); padding: 12px 14px; flex-shrink: 0; }
  #props-title { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .prop-row { margin-bottom: 8px; }
  .prop-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .prop-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 5px 8px; border-radius: var(--radius); outline: none; transition: border-color 0.15s;
  }
  .prop-input:focus { border-color: var(--accent); }
  .color-swatches { display: flex; gap: 5px; flex-wrap: wrap; }
  .swatch {
    width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: var(--text); }
  #props-actions { display: flex; gap: 6px; margin-top: 10px; }
  #props-actions .btn { flex: 1; justify-content: center; font-size: 11px; }

  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, #272727 1px, transparent 0);
    background-size: 28px 28px;
  }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .node {
    position: absolute;
    background: var(--node-bg);
    border: 1.5px solid var(--node-border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: grab;
    min-width: 112px; max-width: 168px;
    text-align: center;
    transition: border-color 0.12s, box-shadow 0.12s, left 0.08s, top 0.08s;
  }
  .node:active { cursor: grabbing; }
  .node.selected {
    border-color: var(--node-selected);
    box-shadow: 0 0 0 3px rgba(200,185,122,0.12);
    z-index: 10;
  }
  .node.root { border-color: var(--accent2); }
  .node.dragging { transition: none !important; z-index: 20; opacity: 0.9; }
  .node-label { font-size: 12px; color: var(--text); word-break: break-word; line-height: 1.4; pointer-events: none; }
  .node-sublabel { font-size: 10px; color: var(--text2); margin-top: 3px; pointer-events: none; }
  .node-add-btn {
    position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 20px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--text3);
    transition: all 0.15s; z-index: 20; line-height: 1;
  }
  .node-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }

  #svg-layer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; overflow: visible;
  }

  #zoom-controls {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 4px; z-index: 50;
  }
  .zoom-btn {
    width: 28px; height: 28px; background: var(--surface);
    border: 1px solid var(--border2); color: var(--text2);
    border-radius: var(--radius); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.15s;
  }
  .zoom-btn:hover { background: var(--surface2); color: var(--text); }
  #zoom-label { font-size: 10px; color: var(--text3); text-align: center; font-family: 'DM Mono', monospace; }

  #snap-pill {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--accent);
    background: var(--surface); border: 1px solid var(--border2);
    padding: 3px 12px; border-radius: 20px;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }

  #export-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    align-items: center; justify-content: center;
  }
  #export-modal.open { display: flex; }
  #export-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 12px; padding: 20px; width: 480px; max-width: 90vw;
  }
  #export-box h3 {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 18px; color: var(--accent); margin-bottom: 12px;
  }
  #export-ta {
    width: 100%; height: 200px; background: var(--bg);
    border: 1px solid var(--border2); color: var(--text2);
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 10px; border-radius: var(--radius); resize: none; outline: none;
  }
  #export-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="brand">tree</span>
  <div class="sep"></div>
  <button class="btn primary" onclick="addRootNode()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
    Add root
  </button>
  <div class="sep"></div>
  <div class="layout-btns">
    <button class="layout-btn active" id="layout-top" onclick="setLayout('top-down')">↓ top–down</button>
    <button class="layout-btn" id="layout-lr" onclick="setLayout('left-right')">→ left–right</button>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="autoLayout()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="5.5" y="9" width="5" height="5" rx="1"/><line x1="4.5" y1="7" x2="4.5" y2="9.5"/><line x1="11.5" y1="7" x2="11.5" y2="9.5"/><line x1="4.5" y1="8.5" x2="11.5" y2="8.5"/><line x1="8" y1="8.5" x2="8" y2="9"/></svg>
    Auto layout
  </button>
  <button class="btn" onclick="resetView()">⊙ reset view</button>
  <div class="spacer"></div>
  <button class="btn" onclick="openExport()">↗ export</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">Structure</div>
    <div id="node-tree"></div>
    <div id="props">
      <div id="props-title">Properties</div>
      <div id="props-content"><div style="font-size:11px;color:var(--text3);">Select a node to edit</div></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <svg id="svg-layer"><defs></defs></svg>
    <div id="canvas"></div>
    <div id="snap-pill">snapped ⊞</div>
    <div id="zoom-controls">
      <button class="zoom-btn" onclick="zoom(0.15)">+</button>
      <div id="zoom-label">100%</div>
      <button class="zoom-btn" onclick="zoom(-0.15)">−</button>
    </div>
  </div>
</div>

<div id="export-modal">
  <div id="export-box">
    <h3>Export</h3>
    <textarea id="export-ta" readonly></textarea>
    <div id="export-actions">
      <button class="btn" onclick="copyExport()">copy JSON</button>
      <button class="btn" onclick="closeExport()">close</button>
    </div>
  </div>
</div>

<script>
const GRID = 28;
const NODE_W = 140, NODE_H = 52;
const COLORS = ['#c8b97a','#8fb3a0','#b08fa0','#7a9cc8','#c8957a','#9ab87a','#c87a7a'];
const DEFAULT_COLOR = '#444';

let nodes = {};
let selectedId = null;
let scale = 1, panX = 0, panY = 0;
let layoutDir = 'top-down';
let nodeIdCounter = 1;

const canvasWrap = document.getElementById('canvas-wrap');
const canvas     = document.getElementById('canvas');
const svgLayer   = document.getElementById('svg-layer');
const nodeTreeEl = document.getElementById('node-tree');
const snapPill   = document.getElementById('snap-pill');

let snapTimer = null;
function flashSnap() {
  snapPill.style.opacity = '1';
  clearTimeout(snapTimer);
  snapTimer = setTimeout(() => snapPill.style.opacity = '0', 700);
}

function snap(v) { return Math.round(v / GRID) * GRID; }
function uid()   { return 'n' + (nodeIdCounter++); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Node CRUD ──────────────────────────────────────────────
function createNode(label, parentId = null, color = DEFAULT_COLOR) {
  const id = uid();
  nodes[id] = { id, label, sublabel: '', color, parentId, children: [], x: 200, y: 100 };
  if (parentId && nodes[parentId]) nodes[parentId].children.push(id);
  renderNode(id);
  renderConnectors();
  renderTree();
  return id;
}

function renderNode(id) {
  const n = nodes[id];
  let el = document.getElementById('node-' + id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'node-' + id;
    el.className = 'node' + (n.parentId === null ? ' root' : '');
    canvas.appendChild(el);
    makeDraggable(el, id);
    el.addEventListener('click', e => { e.stopPropagation(); selectNode(id); });
  }
  el.style.left = n.x + 'px';
  el.style.top  = n.y + 'px';
  const bc = n.color !== DEFAULT_COLOR ? n.color
           : selectedId === id ? 'var(--node-selected)'
           : n.parentId === null ? 'var(--accent2)' : 'var(--node-border)';
  el.style.borderColor = bc;
  if (selectedId === id) el.classList.add('selected'); else el.classList.remove('selected');
  el.innerHTML = `
    <div class="node-label">${esc(n.label)}</div>
    ${n.sublabel ? `<div class="node-sublabel">${esc(n.sublabel)}</div>` : ''}
    <div class="node-add-btn" onclick="event.stopPropagation();addChild('${id}')">+</div>
  `;
}

function removeNodeEl(id) {
  const el = document.getElementById('node-' + id);
  if (el) el.remove();
  const m = document.getElementById('arr-' + id);
  if (m) m.remove();
}

// ── Connectors with arrows ─────────────────────────────────
function getOrCreateMarker(id, color) {
  const mid = 'arr-' + id;
  let m = svgLayer.querySelector('#' + mid);
  if (!m) {
    m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    m.setAttribute('id', mid);
    m.setAttribute('markerWidth', '9');
    m.setAttribute('markerHeight', '7');
    m.setAttribute('refX', '8');
    m.setAttribute('refY', '3.5');
    m.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 9 3.5, 0 7');
    m.appendChild(poly);
    svgLayer.querySelector('defs').appendChild(m);
  }
  m.querySelector('polygon').setAttribute('fill', color);
  return mid;
}

function renderConnectors() {
  Array.from(svgLayer.querySelectorAll('path')).forEach(e => e.remove());

  Object.values(nodes).forEach(n => {
    if (!n.parentId) return;
    const p = nodes[n.parentId];
    if (!p) return;
    const pEl = document.getElementById('node-' + p.id);
    const cEl = document.getElementById('node-' + n.id);
    if (!pEl || !cEl) return;

    const pw = pEl.offsetWidth  || NODE_W;
    const ph = pEl.offsetHeight || NODE_H;
    const cw = cEl.offsetWidth  || NODE_W;
    const ch = cEl.offsetHeight || NODE_H;

    // Arrow retracts 1px inside the box edge so arrowhead tip is flush
    const RETRACT = 1;
    let x1, y1, x2, y2;
    if (layoutDir === 'top-down') {
      x1 = p.x + pw / 2;  y1 = p.y + ph;
      x2 = n.x + cw / 2;  y2 = n.y + RETRACT;
    } else {
      x1 = p.x + pw;       y1 = p.y + ph / 2;
      x2 = n.x + RETRACT;  y2 = n.y + ch / 2;
    }

    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const d = layoutDir === 'top-down'
      ? `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`
      : `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;

    const stroke = n.color !== DEFAULT_COLOR ? n.color + 'bb' : '#404040';
    const markerId = getOrCreateMarker(n.id, stroke);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('marker-end', `url(#${markerId})`);
    svgLayer.appendChild(path);
  });
}

// ── Dragging + grid snap ───────────────────────────────────
function makeDraggable(el, id) {
  let msx, msy, nsx, nsy, dragging = false;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('node-add-btn')) return;
    e.preventDefault(); e.stopPropagation();
    dragging = true;
    msx = e.clientX; msy = e.clientY;
    nsx = nodes[id].x; nsy = nodes[id].y;
    el.classList.add('dragging');
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    nodes[id].x = nsx + (e.clientX - msx) / scale;
    nodes[id].y = nsy + (e.clientY - msy) / scale;
    el.style.left = nodes[id].x + 'px';
    el.style.top  = nodes[id].y + 'px';
    renderConnectors();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');

    const sx = snap(nodes[id].x), sy = snap(nodes[id].y);
    const moved = Math.abs(sx - nodes[id].x) + Math.abs(sy - nodes[id].y);
    nodes[id].x = sx; nodes[id].y = sy;
    // Animate the snap with the CSS transition
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    renderConnectors();
    if (moved > 2) flashSnap();
  });
}

// ── Pan & zoom ─────────────────────────────────────────────
let panning = false, psx, psy, ppx, ppy;
canvasWrap.addEventListener('mousedown', e => {
  if (e.target === canvas || e.target === canvasWrap || e.target === svgLayer || e.target.tagName === 'path') {
    panning = true; psx = e.clientX; psy = e.clientY; ppx = panX; ppy = panY;
    selectNode(null);
  }
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  panX = ppx + (e.clientX - psx); panY = ppy + (e.clientY - psy);
  applyTransform();
});
document.addEventListener('mouseup', () => panning = false);

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.min(2, Math.max(0.3, scale - e.deltaY * 0.001));
  applyTransform();
}, { passive: false });

function applyTransform() {
  const t = `translate(${panX}px,${panY}px) scale(${scale})`;
  canvas.style.transform = svgLayer.style.transform = t;
  canvas.style.transformOrigin = svgLayer.style.transformOrigin = '0 0';
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}
function zoom(d) { scale = Math.min(2, Math.max(0.3, scale + d)); applyTransform(); }
function resetView() { scale = 1; panX = 0; panY = 0; applyTransform(); }

// ── Selection ──────────────────────────────────────────────
function selectNode(id) {
  if (selectedId) { const p = document.getElementById('node-' + selectedId); if (p) p.classList.remove('selected'); renderNode(selectedId); }
  selectedId = id;
  if (id) { renderNode(id); renderPropsPanel(id); } else renderPropsPanel(null);
  renderTree();
}

function renderPropsPanel(id) {
  const el = document.getElementById('props-content');
  if (!id || !nodes[id]) { el.innerHTML = '<div style="font-size:11px;color:var(--text3);">Select a node to edit</div>'; return; }
  const n = nodes[id];
  el.innerHTML = `
    <div class="prop-row"><div class="prop-label">Label</div>
      <input class="prop-input" value="${esc(n.label)}" oninput="updateProp('label',this.value)"></div>
    <div class="prop-row"><div class="prop-label">Sublabel</div>
      <input class="prop-input" placeholder="optional…" value="${esc(n.sublabel)}" oninput="updateProp('sublabel',this.value)"></div>
    <div class="prop-row"><div class="prop-label">Colour</div>
      <div class="color-swatches">
        <div class="swatch ${n.color===DEFAULT_COLOR?'active':''}" style="background:var(--node-border)" onclick="updateProp('color','${DEFAULT_COLOR}')"></div>
        ${COLORS.map(c=>`<div class="swatch ${n.color===c?'active':''}" style="background:${c}" onclick="updateProp('color','${c}')"></div>`).join('')}
      </div></div>
    <div id="props-actions">
      <button class="btn" onclick="addChild('${id}')">+ child</button>
      <button class="btn danger" onclick="deleteNode('${id}')">delete</button>
    </div>`;
}

function updateProp(key, val) {
  if (!selectedId) return;
  nodes[selectedId][key] = val;
  renderNode(selectedId); renderConnectors(); renderPropsPanel(selectedId);
}

// ── Node operations ────────────────────────────────────────
function addRootNode() { const id = createNode('Root ' + nodeIdCounter, null); autoLayout(); selectNode(id); }
function addChild(pid) { const id = createNode('Node ' + nodeIdCounter, pid); autoLayout(); selectNode(id); }

function deleteNode(id) {
  function recurse(nid) {
    if (!nodes[nid]) return;
    [...nodes[nid].children].forEach(recurse);
    removeNodeEl(nid);
    if (nodes[nid].parentId && nodes[nodes[nid].parentId])
      nodes[nodes[nid].parentId].children = nodes[nodes[nid].parentId].children.filter(c => c !== nid);
    delete nodes[nid];
  }
  recurse(id);
  if (selectedId === id) selectNode(null);
  renderConnectors(); renderTree();
}

function renderTree() {
  nodeTreeEl.innerHTML = '';
  Object.values(nodes).filter(n => !n.parentId).forEach(r => renderItem(r, 0));
  function renderItem(n, d) {
    const div = document.createElement('div');
    div.className = 'tree-item' + (selectedId === n.id ? ' selected' : '');
    div.innerHTML = `<span style="width:${d*12}px;display:inline-block"></span><span class="dot"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${esc(n.label)}</span>`;
    div.onclick = () => selectNode(n.id);
    nodeTreeEl.appendChild(div);
    n.children.forEach(cid => { if (nodes[cid]) renderItem(nodes[cid], d + 1); });
  }
}

// ── Layout ─────────────────────────────────────────────────
function setLayout(dir) {
  layoutDir = dir;
  document.getElementById('layout-top').classList.toggle('active', dir === 'top-down');
  document.getElementById('layout-lr').classList.toggle('active', dir === 'left-right');
  autoLayout();
}

function autoLayout() {
  const roots = Object.values(nodes).filter(n => !n.parentId);
  if (!roots.length) return;

  const GAP_X = layoutDir === 'top-down' ? GRID * 2 : GRID * 4;
  const GAP_Y = layoutDir === 'top-down' ? GRID * 4 : GRID * 2;

  function span(id) {
    const n = nodes[id];
    if (!n.children.length) return NODE_W;
    return n.children.reduce((s, c) => s + span(c) + GAP_X, -GAP_X);
  }

  function place(id, ox, oy) {
    const n = nodes[id];
    const s = span(id);
    n.x = snap(ox + s / 2 - NODE_W / 2);
    n.y = snap(oy);
    renderNode(id);
    let cx = ox;
    n.children.forEach(cid => {
      const cs = span(cid);
      if (layoutDir === 'top-down') place(cid, cx, oy + NODE_H + GAP_Y);
      else place(cid, ox + NODE_W + GAP_X, cx);
      cx += cs + GAP_X;
    });
  }

  let cursor = GRID * 3;
  roots.forEach(r => {
    if (layoutDir === 'top-down') { place(r.id, cursor, GRID * 3); cursor += span(r.id) + GRID * 4; }
    else { place(r.id, GRID * 3, cursor); cursor += countLeaves(r.id) * (NODE_H + GAP_Y) + GRID * 4; }
  });
  renderConnectors();
}

function countLeaves(id) {
  const n = nodes[id];
  return n.children.length ? n.children.reduce((s,c) => s + countLeaves(c), 0) : 1;
}

// ── Export ─────────────────────────────────────────────────
function openExport()  { document.getElementById('export-ta').value = JSON.stringify(nodes, null, 2); document.getElementById('export-modal').classList.add('open'); }
function closeExport() { document.getElementById('export-modal').classList.remove('open'); }
function copyExport()  {
  navigator.clipboard.writeText(document.getElementById('export-ta').value);
  const b = document.querySelector('#export-actions .btn'); b.textContent = 'copied!';
  setTimeout(() => b.textContent = 'copy JSON', 1500);
}

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId) deleteNode(selectedId);
  if (e.key === 'Enter' && selectedId) addChild(selectedId);
  if (e.key === 'Escape') selectNode(null);
});

  createNode('Associates', oslo,   DEFAULT_COLOR);
  createNode('Partners',   bergen, DEFAULT_COLOR);
